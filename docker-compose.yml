version: "3.9"

services:
  wan-animate:
    build: .
    container_name: wan-animate
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FAL_KEY=${FAL_KEY:-}   # optional: set as fallback if not entered in UI
    volumes:
      - ./uploads:/app/uploads  # optional temp storage
